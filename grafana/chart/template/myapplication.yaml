apiVersion: apps/v1
kind: Deployment
metadata:
  name: sdk-demo-app
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sdk-demo-app
  template:
    metadata:
      labels:
        app: sdk-demo-app
    spec:
      containers:
        - name: app
          image: myapp:1.0
          env:
            - name: OTEL_SERVICE_NAME
              value: "sdk-demo-app"

            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "otel-collector.observability.svc.cluster.local:4317"

            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "grpc"

            - name: OTEL_TRACES_EXPORTER
              value: "otlp"

            - name: OTEL_METRICS_EXPORTER
              value: "otlp"

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
