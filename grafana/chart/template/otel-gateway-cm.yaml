apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-gateway-config
  namespace: observability
data:
  otel-gateway.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
          http:

    processors:
      batch: {}
      memory_limiter:
        check_interval: 5s
        limit_mib: 400

    exporters:

      # 📊 Metrics → Prometheus backend (remote write)
      prometheusremotewrite:
        endpoint: http://prometheus.monitoring.svc.cluster.local:9090/api/v1/write

      # 📈 Traces → Tempo
      otlp:
        endpoint: tempo.observability.svc.cluster.local:4317
        tls:
          insecure: true

      # 🪵 Logs → Loki
      loki:
        endpoint: http://loki.observability.svc.cluster.local:3100/loki/api/v1/push

      # Debug (optional)
      debug:
        verbosity: detailed

    service:
      pipelines:

        metrics:
          receivers: [otlp]
          processors: [batch, memory_limiter]
          exporters: [prometheusremotewrite, debug]

        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlp, debug]

        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [loki, debug]
