apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-gateway-config
  namespace: observability
data:
  otel-gateway.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
          http:

    processors:
      batch: {}
      memory_limiter:
        check_interval: 5s
        limit_mib: 400

    exporters:

      # 📊 Metrics → Prometheus backend (remote write)
      prometheusremotewrite:
        endpoint: http://prometheus.monitoring.svc.cluster.local:9090/api/v1/write

      # Debug (optional)
      debug:
        verbosity: detailed

    service:
      pipelines:

        metrics:
          receivers: [otlp]
          processors: [batch, memory_limiter]
          exporters: [prometheusremotewrite, debug]

