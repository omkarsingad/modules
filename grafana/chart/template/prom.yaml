apiVersion: monitoring.coreos.com/v1
kind: Prometheus
metadata:
  name: prometheus
  namespace: monitoring
spec:
  replicas: 1

  serviceAccountName: prometheus-k8s

  serviceMonitorSelector:
    matchLabels:
      release: kube-prometheus-stack

  podMonitorSelector: {}

  ruleSelector: {}

  resources:
    requests:
      memory: 400Mi
